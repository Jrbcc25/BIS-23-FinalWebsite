<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mortgage Calculator</title>
  <link rel="stylesheet" href="style.css">
  <script src="mortgage.js" defer></script>
</head>
<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="calculator.html">MPG Calculator</a>
    <a href="mortgage.html">Mortgage Calculator</a>
    <a href="contact.html">Contact</a>
  </nav>

  <header class="hero">
    <h1>Mortgage Calculator</h1>
    <p>Use this calculator to estimate a monthly mortgage payment.</p>
  </header>

  <main>
    <section class="calculator-section">
      <h2>Home Mortgage Calculator</h2>

      <form name="Form1" class="mortgage-form">
        <label for="amount">Mortgage Amount:</label>
        <input type="number" id="amount" placeholder="Enter loan amount">

        <label for="interest">Annual Interest Rate:</label>
        <input type="number" id="interest" placeholder="Example: 6.5">

        <label for="years">Number of Years:</label>
        <input type="number" id="years" placeholder="Example: 30">

        <button type="button" onclick="calculateMortgage()">Calculate Payment</button>

        <p id="payment"></p>
      </form>
    </section>
  </main>

</body>
</html>
